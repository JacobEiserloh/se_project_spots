<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="Instagram clone!"/><meta name="author" content="Jacob Eiserloh"/><meta name="keywords" content="html, css"/><title>Spots!</title><link rel="icon" href="favicon.ico"><script defer="defer" src="main.js"></script><link href="main.css" rel="stylesheet"></head><body><div class="page"><header class="header"><img src="ce1b93020621958c5ad4.svg" alt="Spots logo" class="header__image"/></header><main class="content"><section class="profile page__section"><img src="2fc47fd8e9a9bcd9612f.jpg" alt="profile avatar" class="profile__avatar"/><div class="profile__info"><h1 class="profile__name">Bessie Coleman</h1><p class="profile__description">Civil Aviator</p><button type="button" class="profile__edit-button"><img src="49e44e5e03758262e8bf.svg" alt="edit button image"/> Edit Profile</button></div><button type="button" class="profile__add-button"><img src="975792ea68af0a3c209d.svg" alt="add button image"/> New Post</button></section><section class="cards page__section"><ul class="cards__list"><template id="cards__template"><li class="card"><img class="card__image"/> <button type="button" class="card__delete-button"></button><div class="card__content"><h2 class="card__title"></h2><button type="button" class="card__like-button"></button></div></li></template></ul></section></main><footer class="footer"><p class="footer__copyright">2025 &copy; Spots</p></footer><div class="modal" id="edit-profile-modal"><div class="modal__container"><button class="modal__close-bttn" type="button"><img src="b9d33f1846c7b4e4e5d3.svg" alt="close icon"/></button><h2 class="modal__title">Edit profile</h2><form class="form modal__form"><label for="profile-name-input" class="form__label">Name <input id="profile-name-input" class="form__input" placeholder="Type your name" required minlength="2" maxlength="40"/> <span id="profile-name-input-error" class="form__input-error"></span></label> <label for="profile-desc-input" class="form__label">Description <input id="profile-desc-input" class="form__input" placeholder="Describe yourself" required minlength="2" maxlength="200"/> <span id="profile-desc-input-error" class="form__input-error"></span></label> <button class="form__submit-btn" type="submit">Save</button></form></div></div><div class="modal" id="new-post-modal"><div class="modal__container"><button class="modal__close-bttn" type="button"><img src="b9d33f1846c7b4e4e5d3.svg" alt="close icon"/></button><h2 class="modal__title">New post</h2><form class="form modal__form"><label for="card-image-input" class="form__label">Image link <input id="card-image-input" type="url" class="form__input" placeholder="Paste a link to the picture" required/> <span id="card-image-input-error" class="form__input-error"></span></label> <label for="card-caption-input" class="form__label">Caption <input id="card-caption-input" class="form__input" placeholder="Type your caption" required minlength="2" maxlength="30"/> <span id="card-caption-input-error" class="form__input-error"></span></label> <button class="form__submit-btn" type="submit">Save</button></form></div></div><div class="modal" id="preview-modal"><div class="modal__preview-container"><button class="modal__close-bttn modal__close-bttn_type_preview" type="button"><img src="2a6d443422ae27e8b633.svg" alt="close icon"/></button> <img class="modal__preview-image"/><p class="modal__caption"></p></div></div></div></body></html>
